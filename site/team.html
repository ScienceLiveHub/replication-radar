<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Replication Radar — the team</title>
  <meta name="description" content="The people building Replication Radar for the OpenAIRE AI Hackathon — built in the open, contributors welcome." />
  <link rel="stylesheet" href="style.css" />
  <style>
    .twrap{max-width:880px}
    .lead{font-size:16px;color:var(--ink);line-height:1.6;margin:0 0 8px}
    .backbar{margin:6px 0 22px;font-size:13.5px}
    .members{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:8px 0 34px}
    @media(max-width:720px){.members{grid-template-columns:1fr}}
    .member{border:1px solid var(--line);border-radius:14px;padding:20px 22px;background:var(--card)}
    .mhead{display:flex;align-items:center;gap:14px;margin-bottom:12px}
    .avatar{width:54px;height:54px;border-radius:50%;flex:0 0 54px;object-fit:cover;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;letter-spacing:.5px}
    .mname{margin:0;font-size:17px;color:var(--navy)}
    .mrole{margin:2px 0 0;font-size:13px;color:var(--mut)}
    .bio{font-size:14px;color:var(--ink);line-height:1.6}
    .bio p{margin:0 0 10px}
    .bio ul{margin:0;padding-left:18px}
    .bio li{margin:4px 0}
    .mlinks{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
    .mlink{font-size:12px;font-weight:700;border:1px solid var(--line);border-radius:20px;padding:3px 12px;text-decoration:none;color:var(--navy2)}
    a.mlink:hover{border-color:var(--magenta);color:var(--magenta)}
    .join{border:1px solid var(--line);border-radius:14px;padding:22px 24px;background:var(--magenta-soft)}
    .join h2{margin:0 0 8px;font-size:20px;color:var(--navy)}
    .join p{font-size:14px;color:var(--ink);line-height:1.6;margin:0 0 12px}
    .forknote{font-size:13px;color:var(--mut)}
    .join code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12.5px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 6px}
    .join pre{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px 16px;overflow:auto;line-height:1.55;color:var(--ink)}
    .joinbtns{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 16px}
    .joinbtn{display:inline-block;font-size:14px;font-weight:600;text-decoration:none;border-radius:10px;padding:11px 20px}
    .joinbtn.primary{background:var(--magenta);color:#fff}
    .joinbtn.primary:hover{background:#a32a6a}
    .joinbtn.ghost{background:#fff;color:var(--navy2);border:1px solid var(--line)}
    .joinbtn.ghost:hover{border-color:var(--magenta);color:var(--magenta)}
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1>The team</h1>
      <p class="tag">Built in the open — and contributors become part of it.</p>
      <p class="sub">Replication Radar · Science Live × OpenAIRE AI Hackathon</p>
    </div>
  </header>
  <main class="wrap twrap">
    <p class="backbar">← <a href="index.html">Back to the Radar</a></p>
    <p id="lead" class="lead"></p>
    <div id="members" class="members"></div>
    <div id="join"></div>
  </main>
  <footer>
    <div class="wrap">
      <span>This page lists every Markdown bio in <a href="https://github.com/ScienceLiveHub/replication-radar/tree/main/site/bios">site/bios/</a> automatically.</span>
      <span><a href="index.html">Replication Radar</a> · <a href="methodology.html">methodology</a> · <a href="https://github.com/ScienceLiveHub/replication-radar">code (MIT)</a></span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const REPO = "ScienceLiveHub/replication-radar";
    const BIOS_PATH = "site/bios";
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    const md = (s) => (window.marked ? marked.parse(String(s || "")) : esc(s).replace(/\n/g, "<br>"));
    const initials = (name) => (name || "?").split(/\s+/).filter(Boolean).slice(0, 2).map((w) => w[0].toUpperCase()).join("");

    // Minimal YAML-frontmatter parser: flat "key: value" lines between leading --- fences.
    function parseBio(text) {
      const m = text.match(/^﻿?---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);
      if (!m) return { meta: {}, body: text };
      const meta = {};
      m[1].split("\n").forEach((line) => {
        const i = line.indexOf(":");
        if (i < 0) return;
        const k = line.slice(0, i).trim();
        let v = line.slice(i + 1).replace(/\s+#.*$/, "").trim().replace(/^["']|["']$/g, "");
        if (k) meta[k] = v;
      });
      return { meta, body: m[2] };
    }

    const LINK_ORDER = [["linkedin", "LinkedIn"], ["github", "GitHub"], ["orcid", "ORCID"], ["web", "Website"]];
    const renderLinks = (meta) => LINK_ORDER
      .filter(([k]) => meta[k] && /^https?:\/\//.test(meta[k]))
      .map(([k, label]) => `<a class="mlink" href="${esc(meta[k])}" target="_blank" rel="noopener">${esc(label)}</a>`)
      .join("");

    const avatar = (meta) => meta.photo && /^https?:|\.(png|jpe?g|webp|svg)$/i.test(meta.photo)
      ? `<img class="avatar" src="${esc(meta.photo)}" alt="${esc(meta.name || "")}" />`
      : `<div class="avatar" aria-hidden="true">${esc(initials(meta.name))}</div>`;

    // Discover bio files: GitHub Contents API (always reflects main), with a static index.json fallback.
    async function listBios() {
      try {
        const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${BIOS_PATH}`, { headers: { Accept: "application/vnd.github+json" } });
        if (r.ok) {
          const files = (await r.json()).filter((f) => f.type === "file" && f.name.endsWith(".md")).map((f) => f.name);
          if (files.length) return files.sort();
        }
      } catch (e) { /* fall through */ }
      try {
        const r = await fetch("bios/index.json");
        if (r.ok) return (await r.json()).slice().sort();
      } catch (e) { /* fall through */ }
      return [];
    }

    function renderContribute(c) {
      c = c || {};
      // GitHub's new-file editor, pre-filled with the filename + template. For anyone
      // without write access, GitHub automatically forks the repo and opens a pull request.
      const newFileUrl = `https://github.com/${REPO}/new/main?filename=${encodeURIComponent("site/bios/your-name.md")}&value=${encodeURIComponent(c.example || "")}`;
      document.getElementById("join").innerHTML = `
        <section class="join">
          <h2>${esc(c.heading || "Join the team")}</h2>
          <p>${md(c.body || "")}</p>
          <div class="joinbtns">
            ${c.issueUrl ? `<a class="joinbtn primary" href="${esc(c.issueUrl)}" target="_blank" rel="noopener">Open an issue to say hi</a>` : ""}
            <a class="joinbtn ghost" href="${esc(newFileUrl)}" target="_blank" rel="noopener">Add your bio (pre-filled file)</a>
          </div>
          <p class="forknote">No repo access needed — GitHub forks the project for you and opens a pull request. Just rename the file, fill in the template, and click <b>Propose new file</b>.</p>
          ${c.example ? `<p>The template you'll get:</p><pre>${esc(c.example)}</pre>` : ""}
        </section>`;
    }

    (async () => {
      let cfg = {};
      try { cfg = await (await fetch("team.json")).json(); } catch (e) { /* page still works from bios alone */ }
      document.title = cfg.title || document.title;
      document.getElementById("lead").innerHTML = md(cfg.intro || "");
      renderContribute(cfg.contribute);

      const names = await listBios();
      const bios = await Promise.all(names.map((n) =>
        fetch(`bios/${n}`).then((r) => (r.ok ? r.text() : "")).then(parseBio).catch(() => ({ meta: {}, body: "" }))
      ));

      const el = document.getElementById("members");
      if (!bios.length) { el.innerHTML = `<p class="lead">No bios found yet — be the first to <a href="${esc((cfg.contribute || {}).newFileUrl || "#")}">add yours</a>.</p>`; return; }
      el.innerHTML = bios.map(({ meta, body }) => `
        <article class="member">
          <div class="mhead">${avatar(meta)}<div><h2 class="mname">${esc(meta.name || "")}</h2><p class="mrole">${esc(meta.role || "")}</p></div></div>
          <div class="bio">${md(body)}</div>
          <div class="mlinks">${renderLinks(meta)}</div>
        </article>`).join("");
    })();
  </script>
</body>
</html>
